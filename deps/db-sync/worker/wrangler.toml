name = "logseq-sync"
main = "dist/worker/main.js"
compatibility_date = "2025-05-05"
compatibility_flags = [ "nodejs_compat" ]

[version_metadata]
binding = "CF_VERSION_METADATA"

[observability]
enabled = true

[observability.logs]
invocation_logs = false

[[durable_objects.bindings]]
name = "LOGSEQ_SYNC_DO"
class_name = "SyncDO"

[[r2_buckets]]
binding = "LOGSEQ_SYNC_ASSETS"
bucket_name = "REPLACE_WITH_SYNC_ASSETS_BUCKET"

[[d1_databases]]
binding = "DB"
database_name = "REPLACE_WITH_SYNC_DB_NAME"
database_id = "REPLACE_WITH_SYNC_DB_ID"

[[migrations]]
tag = "v1"
new_sqlite_classes = [ "SyncDO" ]

[vars]
COGNITO_JWKS_URL = "https://cognito-idp.<region>.amazonaws.com/<user-pool-id>/.well-known/jwks.json"
COGNITO_ISSUER = "https://cognito-idp.<region>.amazonaws.com/<user-pool-id>"
COGNITO_CLIENT_ID = "REPLACE_WITH_COGNITO_CLIENT_ID"

[env.staging]
name = "logseq-sync-staging"

[env.staging.vars]
COGNITO_JWKS_URL = "https://cognito-idp.<region>.amazonaws.com/<user-pool-id>/.well-known/jwks.json"
COGNITO_ISSUER = "https://cognito-idp.<region>.amazonaws.com/<user-pool-id>"
COGNITO_CLIENT_ID = "REPLACE_WITH_COGNITO_CLIENT_ID"
SENTRY_DSN = "REPLACE_WITH_SENTRY_DSN"
SENTRY_ENVIRONMENT = "staging"
SENTRY_TRACES_SAMPLE_RATE = "0.1"

[[env.staging.durable_objects.bindings]]
name = "LOGSEQ_SYNC_DO"
class_name = "SyncDO"

[[env.staging.migrations]]
tag = "v1"
new_sqlite_classes = [ "SyncDO" ]

[[env.staging.r2_buckets]]
binding = "LOGSEQ_SYNC_ASSETS"
bucket_name = "REPLACE_WITH_STAGING_SYNC_ASSETS_BUCKET"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "REPLACE_WITH_STAGING_SYNC_DB_NAME"
database_id = "REPLACE_WITH_STAGING_SYNC_DB_ID"

[env.staging.version_metadata]
binding = "CF_VERSION_METADATA"

[env.prod]
name = "logseq-sync-prod"

[env.prod.vars]
COGNITO_JWKS_URL = "https://cognito-idp.<region>.amazonaws.com/<user-pool-id>/.well-known/jwks.json"
COGNITO_ISSUER = "https://cognito-idp.<region>.amazonaws.com/<user-pool-id>"
COGNITO_CLIENT_ID = "REPLACE_WITH_COGNITO_CLIENT_ID"
SENTRY_DSN = "REPLACE_WITH_SENTRY_DSN"
SENTRY_ENVIRONMENT = "prod"
SENTRY_TRACES_SAMPLE_RATE = "0.1"

[[env.prod.durable_objects.bindings]]
name = "LOGSEQ_SYNC_DO"
class_name = "SyncDO"

[[env.prod.migrations]]
tag = "v1"
new_sqlite_classes = [ "SyncDO" ]

[[env.prod.r2_buckets]]
binding = "LOGSEQ_SYNC_ASSETS"
bucket_name = "REPLACE_WITH_PROD_SYNC_ASSETS_BUCKET"

[[env.prod.d1_databases]]
binding = "DB"
database_name = "REPLACE_WITH_PROD_SYNC_DB_NAME"
database_id = "REPLACE_WITH_PROD_SYNC_DB_ID"

[env.prod.version_metadata]
binding = "CF_VERSION_METADATA"
